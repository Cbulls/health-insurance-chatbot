name: Quality & Performance Gates

# PR 차단이 아니라 야간 배치 + 수동 트리거.
# 이유: 골드셋·실제 모델·GPU가 필요해 매 PR에서 돌리면 느리고, 리소스 없으면 무의미.
# 품질 회귀는 머지를 막진 않되, 야간에 잡아 알림한다(점진적으로 차단으로 승격 가능).
on:
  schedule:
    - cron: "0 17 * * *"   # 매일 02:00 KST (UTC 17:00)
  workflow_dispatch: {}     # 수동 실행

jobs:
  # ── 품질 게이트: 골드셋 기반 retrieval/generation 평가 ──
  quality-gate:
    runs-on: ubuntu-latest
    # 실제로는 골드셋 시크릿·임베딩 서버 엔드포인트가 필요
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: pip install -e ".[dev]"
      - name: 측정 방법론 자체 검증(신뢰구간 게이트 동작)
        run: PYTHONPATH=src python tests/contract/test_measurement.py
      - name: 품질 평가 (골드셋 필요 — 리소스 확보 후 활성화)
        run: |
          echo "TODO: 골드셋 로드 → eval/harness.py 실행 → 유형별 SLO 판정"
          echo "  - recall@k, MRR (retrieval)"
          echo "  - faithfulness, abstention (generation, 신뢰구간 하한이 SLO 초과해야 통과)"
          echo "  - 골드셋·임베딩 서버 미확보로 현재는 스켈레톤"
        # 활성화 시:
        # env: { HARAG_GOLDSET_PATH: ${{ secrets.GOLDSET_PATH }}, ... }
        # run: PYTHONPATH=src python -m harag.eval.run_quality_gate

  # ── 성능 게이트: 부하 테스트(워밍업 제외·p95/p99) ──
  perf-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: pip install -e ".[dev]"
      - name: 성능 측정 방법론 검증(워밍업·백분위·단계분해)
        run: PYTHONPATH=src python tests/contract/test_measurement.py
      - name: 부하 테스트 (배포 환경 필요 — 확보 후 활성화)
        run: |
          echo "TODO: open-loop 부하 주입(locust/k6) → eval/perf.py 분석"
          echo "  - 워밍업 제외, p95/p99, 단계별 분해"
          echo "  - 배포 환경·GPU 미확보로 현재는 스켈레톤"

  # ── PoC 게이트: HWP 파싱 표 복원율(실제 표본 필요) ──
  poc-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: pip install -e ".[dev]"
      - name: PoC 판정 로직 검증
        run: PYTHONPATH=src python tests/contract/test_poc.py
      - name: 실제 표본 PoC (골든 표본 필요 — 확보 후 활성화)
        run: |
          echo "TODO: fixtures/golden/ 표본 → 실제 디코더 파싱 → eval/poc.py 판정"
          echo "  - 층화 표집, 최악 층, abstention 거부권"
          echo "  - 실제 행정문서 표본·HWP 디코더 미확보로 현재는 스켈레톤"
