# 제품 SLO 동결 초안 — load test / quality gate가 이 값을 참조한다.
version: 1
quality:
  min_hit_at_k: 0.70
  min_mrr: 0.60
  min_abstention_acc: 0.90
  min_citation_faithful: 0.90
latency:
  # 동시 창구 >10 시 load test로 재동결
  query_p95_ms: 8000
  query_p99_ms: 15000
  ingest_ready_p95_s: 120
capacity:
  qdrant_disk_warn_pct: 80
  redis_consumer_lag_warn: 100
budget:
  daily_question_default: 200
  daily_token_default: 500000
