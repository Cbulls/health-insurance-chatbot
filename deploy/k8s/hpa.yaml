apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: harag-api
  namespace: harag
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: harag-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: harag-worker
  namespace: harag
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: harag-worker
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
