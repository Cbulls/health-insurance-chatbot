# harag PDF RAG MVP — 전체 기동(qdrant + redis + api + worker).
# 사용:  cp .env.example .env  →  docker compose up --build
# 브라우저:  http://localhost:8000
#
# 프로파일:
#   postgres — Postgres 메타 DB
#   minio    — S3 호환 원본 보존
#   ops      — postgres + minio (운영 로컬)
#   tei      — GPU CrossEncoder 리랭커(호스트 GPU 필요)
#
# 상세: docs/SECRETS_OPS.md
services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    profiles: ["postgres", "ops"]
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: harag
      POSTGRES_PASSWORD: harag
      POSTGRES_DB: harag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    profiles: ["minio", "ops"]
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  tei-rerank:
    profiles: ["tei"]
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      MODEL_ID: ${TEI_RERANK_MODEL:-BAAI/bge-reranker-base}
    # GPU: image를 cuda 태그로 바꾸고 deploy.resources 추가

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
      - redis
    ports:
      - "8000:8000"
    volumes:
      - harag_data:/app/data
      - harag_spool:/app/spool
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-harag_pdf_mvp}
      QDRANT_DISK_BUDGET_MB: ${QDRANT_DISK_BUDGET_MB:-3072}
      QDRANT_PAYLOAD_BYTES_PER_POINT: ${QDRANT_PAYLOAD_BYTES_PER_POINT:-2048}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      HARAG_SPOOL_DIR: /app/spool
      ENABLE_DOC_CONVERT: ${ENABLE_DOC_CONVERT:-true}
      LIBREOFFICE_BIN: ${LIBREOFFICE_BIN:-soffice}
      PARSE_MIN_TABLE_RECOVERY: ${PARSE_MIN_TABLE_RECOVERY:-0.5}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/harag.db}
      EMBEDDING_SEND_DIMENSIONS: ${EMBEDDING_SEND_DIMENSIONS:-}
      LLM_REWRITE_ENABLED: ${LLM_REWRITE_ENABLED:-true}
      LLM_REWRITE_MODEL: ${LLM_REWRITE_MODEL:-}
      RATE_LIMIT_QPM: ${RATE_LIMIT_QPM:-20}
      DAILY_QUESTION_BUDGET: ${DAILY_QUESTION_BUDGET:-0}
      DAILY_TOKEN_BUDGET: ${DAILY_TOKEN_BUDGET:-0}
      PII_MASK_ENABLED: ${PII_MASK_ENABLED:-true}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      AUTH_OIDC_JWKS_URL: ${AUTH_OIDC_JWKS_URL:-}
      AUTH_ALLOW_DEMO_OWNER: ${AUTH_ALLOW_DEMO_OWNER:-true}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-}
      OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-}
      OBJECT_STORE_ACCESS_KEY: ${OBJECT_STORE_ACCESS_KEY:-}
      OBJECT_STORE_SECRET_KEY: ${OBJECT_STORE_SECRET_KEY:-}
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-harag-originals}
      OBJECT_STORE_REGION: ${OBJECT_STORE_REGION:-us-east-1}
      RERANKER_SERVER_URL: ${RERANKER_SERVER_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://api.openai.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      TOP_K: ${TOP_K:-20}
      MIN_SCORE: ${MIN_SCORE:-0.15}

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
      - redis
    command: ["python", "-m", "harag.indexing.run_worker"]
    volumes:
      - harag_data:/app/data
      - harag_spool:/app/spool
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-harag_pdf_mvp}
      QDRANT_DISK_BUDGET_MB: ${QDRANT_DISK_BUDGET_MB:-3072}
      QDRANT_PAYLOAD_BYTES_PER_POINT: ${QDRANT_PAYLOAD_BYTES_PER_POINT:-2048}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      HARAG_SPOOL_DIR: /app/spool
      ENABLE_DOC_CONVERT: ${ENABLE_DOC_CONVERT:-true}
      LIBREOFFICE_BIN: ${LIBREOFFICE_BIN:-soffice}
      PARSE_MIN_TABLE_RECOVERY: ${PARSE_MIN_TABLE_RECOVERY:-0.5}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/harag.db}
      PII_MASK_ENABLED: ${PII_MASK_ENABLED:-true}
      OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-}
      OBJECT_STORE_ACCESS_KEY: ${OBJECT_STORE_ACCESS_KEY:-}
      OBJECT_STORE_SECRET_KEY: ${OBJECT_STORE_SECRET_KEY:-}
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-harag-originals}
      OBJECT_STORE_REGION: ${OBJECT_STORE_REGION:-us-east-1}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://api.openai.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      EMBEDDING_SEND_DIMENSIONS: ${EMBEDDING_SEND_DIMENSIONS:-}

volumes:
  qdrant_storage:
  postgres_data:
  harag_data:
  redis_data:
  harag_spool:
  minio_data:
