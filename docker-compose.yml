# harag PDF RAG MVP — 전체 기동(qdrant + api). 프론트엔드는 api가 정적 서빙.
# 사용:  cp .env.example .env  (필요시 키 입력) →  docker compose up --build
# 브라우저:  http://localhost:8000
#
# 문서 등록부 기본은 SQLite(./data/harag.db). PostgreSQL을 쓰려면:
#   1) docker compose --profile postgres up -d postgres
#   2) .env에 DATABASE_URL=postgresql+psycopg://harag:harag@postgres:5432/harag
#      (호스트에서 API만 돌릴 때는 localhost:5432)
#   3) pip install 'psycopg[binary]>=3.1' 또는 pip install -e '.[postgres]'
#
# 리랭커(GPU TEI, 선택): 별도 호스트/컨테이너에 TEI /rerank를 띄운 뒤
#   .env에 RERANKER_SERVER_URL=http://<host>:8080 을 넣는다.
#   URL이 없으면 API가 LexicalCrossEncoder로 폴백한다(데모 가능).
services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    profiles: ["postgres"]
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: harag
      POSTGRES_PASSWORD: harag
      POSTGRES_DB: harag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
      - redis
    ports:
      - "8000:8000"
    volumes:
      # SQLite 등록부 영속화(기본 DATABASE_URL)
      - harag_data:/app/data
      # API↔워커 스풀 공유(업로드 PDF 임시 파일)
      - harag_spool:/app/spool
    environment:
      # Qdrant 연결(컴포즈 네트워크 내부 호스트명). Qdrant Cloud를 쓰려면
      # .env에서 QDRANT_URL/QDRANT_API_KEY를 클라우드 값으로 덮어쓴다.
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-harag_pdf_mvp}
      QDRANT_DISK_BUDGET_MB: ${QDRANT_DISK_BUDGET_MB:-3072}
      QDRANT_PAYLOAD_BYTES_PER_POINT: ${QDRANT_PAYLOAD_BYTES_PER_POINT:-2048}
      # Redis — 비우면 인메모리 폴백(워커 불필요, API 인프로세스 인제스트)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      HARAG_SPOOL_DIR: /app/spool
      # 문서 등록부. 비우면 sqlite:///./data/harag.db.
      # Postgres 예: postgresql+psycopg://harag:harag@postgres:5432/harag
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/harag.db}
      EMBEDDING_SEND_DIMENSIONS: ${EMBEDDING_SEND_DIMENSIONS:-}
      LLM_REWRITE_ENABLED: ${LLM_REWRITE_ENABLED:-true}
      LLM_REWRITE_MODEL: ${LLM_REWRITE_MODEL:-}
      RATE_LIMIT_QPM: ${RATE_LIMIT_QPM:-20}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # 임베딩/LLM: .env에서 주입. 비우면 로컬 폴백(키 없이 데모 가능).
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://api.openai.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      TOP_K: ${TOP_K:-20}
      MIN_SCORE: ${MIN_SCORE:-0.15}

  # Redis 큐 소비자 — REDIS_URL이 설정된 경우 API와 함께 기동한다.
  worker:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
      - redis
    command: ["python", "-m", "harag.indexing.run_worker"]
    volumes:
      - harag_data:/app/data
      - harag_spool:/app/spool
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-harag_pdf_mvp}
      QDRANT_DISK_BUDGET_MB: ${QDRANT_DISK_BUDGET_MB:-3072}
      QDRANT_PAYLOAD_BYTES_PER_POINT: ${QDRANT_PAYLOAD_BYTES_PER_POINT:-2048}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      HARAG_SPOOL_DIR: /app/spool
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/harag.db}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://api.openai.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      EMBEDDING_SEND_DIMENSIONS: ${EMBEDDING_SEND_DIMENSIONS:-}

volumes:
  qdrant_storage:
  postgres_data:
  harag_data:
  redis_data:
  harag_spool:
