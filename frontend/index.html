<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>harag — PDF RAG 챗봇</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">harag</div>
        <div class="tagline">한글 행정문서 RAG · PDF MVP</div>
      </div>

      <div class="upload" id="dropzone">
        <input type="file" id="fileInput" accept="application/pdf" hidden />
        <div class="upload-inner">
          <div class="upload-icon">＋</div>
          <div class="upload-text">PDF를 끌어다 놓거나<br /><b>클릭해서 업로드</b></div>
          <div class="upload-hint">본인이 올린 문서만 검색됩니다</div>
        </div>
      </div>

      <div class="docs">
        <div class="docs-title">내 문서</div>
        <ul id="docList" class="doc-list"></ul>
      </div>

      <div class="owner">세션 ID: <span id="ownerId"></span></div>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <h1>문서 기반 질의응답</h1>
        <p>업로드한 PDF의 내용에 근거해 출처와 함께 답합니다. 근거가 없으면 지어내지 않고 "모른다"고 답합니다.</p>
      </header>

      <div id="messages" class="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-emoji">📄</div>
          <p>왼쪽에서 PDF를 업로드한 뒤 질문을 입력하세요.</p>
          <p class="empty-example">예: "출장비 한도는 얼마인가요?"</p>
        </div>
      </div>

      <form id="composer" class="composer">
        <textarea id="queryInput" rows="1" placeholder="질문을 입력하세요…"
                  autocomplete="off"></textarea>
        <button type="submit" id="sendBtn">보내기</button>
      </form>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
